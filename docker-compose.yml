services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-poc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: rag-poc-app
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      # From inside the container, "localhost" is the container itself, so
      # reaching Ollama on the host requires host.docker.internal. We force
      # this here (same pattern as QDRANT_URL above) so users don't hit
      # "Cannot assign requested address" by copying the mode-B default.
      OLLAMA_URL: http://host.docker.internal:11434
    # Allows the app container to reach Ollama running on the host at
    # http://host.docker.internal:11434. Already works out-of-the-box on
    # Docker Desktop (macOS / Windows); this line is what makes it resolve
    # on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./content:/app/content:ro
      - hf_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache:
